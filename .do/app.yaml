name: launchpad-jobs
region: nyc
domains:
  - domain: trypipeline.ai
    type: PRIMARY
  - domain: www.trypipeline.ai
    type: ALIAS
services:
  - name: web
    github:
      repo: glennfiocca/launchpad-jobs
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /api/health
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTAUTH_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: NEXTAUTH_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RESEND_FROM_EMAIL
        scope: RUN_AND_BUILD_TIME
        value: noreply@trypipeline.ai
      - key: RESEND_INBOUND_DOMAIN
        scope: RUN_AND_BUILD_TIME
        value: track.trypipeline.ai
      - key: RESEND_INBOUND_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_SPACES_BUCKET
        scope: RUN_AND_BUILD_TIME
        value: pipeline-uploads
      - key: DO_SPACES_REGION
        scope: RUN_AND_BUILD_TIME
        value: nyc3
      - key: LOGO_DEV_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_LOGO_DEV_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CRON_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: NEXT_PUBLIC_APP_NAME
        scope: RUN_AND_BUILD_TIME
        value: Pipeline
      - key: PLAYWRIGHT_BROWSERS_PATH
        scope: RUN_AND_BUILD_TIME
        value: /app/.cache/ms-playwright
      - key: STRIPE_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_PRICE_ID
        scope: RUN_AND_BUILD_TIME
        value: price_1TMGWfBmZYNV8HgvnU6JpG0P
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

jobs:
  - name: migrate
    github:
      repo: glennfiocca/launchpad-jobs
      branch: main
      deploy_on_push: true
    kind: PRE_DEPLOY
    run_command: npx prisma migrate deploy
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_TIME
        type: SECRET

  - name: sync-jobs
    github:
      repo: glennfiocca/launchpad-jobs
      branch: main
      deploy_on_push: true
    kind: SCHEDULED
    schedule:
      # 09:00 UTC = 04:00 EST (Nov–Mar) / 05:00 EDT (Mar–Nov).
      # DO cron does not support timezones. To hit 04:00 EDT: change to "0 8 * * *".
      cron: "0 9 * * *"
    run_command: npx tsx scripts/sync-cron.ts
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    timeout_seconds: 1800
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_TIME
        type: SECRET
