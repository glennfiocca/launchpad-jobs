name: launchpad-jobs
region: nyc
domains:
  - domain: trypipeline.ai
    type: PRIMARY
  - domain: www.trypipeline.ai
    type: ALIAS
services:
  - name: web
    github:
      repo: glennfiocca/launchpad-jobs
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    run_command: npm start
    http_port: 3000
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    health_check:
      http_path: /api/health
    envs:
      - key: DATABASE_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXTAUTH_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: NEXTAUTH_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RESEND_FROM_EMAIL
        scope: RUN_AND_BUILD_TIME
        value: noreply@trypipeline.ai
      - key: RESEND_INBOUND_DOMAIN
        scope: RUN_AND_BUILD_TIME
        value: track.trypipeline.ai
      - key: RESEND_INBOUND_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: ANTHROPIC_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_SPACES_BUCKET
        scope: RUN_AND_BUILD_TIME
        value: pipeline-uploads
      - key: DO_SPACES_REGION
        scope: RUN_AND_BUILD_TIME
        value: nyc3
      - key: LOGO_DEV_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_LOGO_DEV_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: CRON_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: NEXT_PUBLIC_APP_NAME
        scope: RUN_AND_BUILD_TIME
        value: Pipeline
      - key: PLAYWRIGHT_BROWSERS_PATH
        scope: RUN_AND_BUILD_TIME
        value: /app/.cache/ms-playwright
      - key: STRIPE_SECRET_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_WEBHOOK_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: STRIPE_PRICE_ID
        scope: RUN_AND_BUILD_TIME
        value: price_1TMGWfBmZYNV8HgvnU6JpG0P
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET

jobs:
  - name: migrate
    github:
      repo: glennfiocca/launchpad-jobs
      branch: main
      deploy_on_push: true
    kind: PRE_DEPLOY
    run_command: npx prisma migrate deploy
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_TIME
        type: SECRET

  # NOTE: when running `doctl apps update` against this spec, every SECRET
  # env var below must have its `value:` field set to the real plaintext
  # secret (DO encrypts at rest). Leaving `value:` unset will silently
  # blank out the existing encrypted value. Source of truth for the
  # plaintext values: /Users/glennfiocca/launchpad/.env (not committed).
  - name: sync-jobs
    github:
      repo: glennfiocca/launchpad-jobs
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    kind: SCHEDULED
    schedule:
      # Every 6 hours: 00:00, 06:00, 12:00, 18:00 UTC.
      # DO cron is pure UTC — does not auto-shift for DST.
      # Cadence aligned with how often new jobs roll in across our ATS
      # population; daily was leaving job listings ~24h stale.
      cron: "0 */6 * * *"
    run_command: npx tsx scripts/sync-cron.ts
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-1gb
    timeout_seconds: 1800
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_TIME
        type: SECRET
      # SENTRY_DSN: copy the same DSN already configured on the `web`
      # service. Track C.2 — without this, scripts/sync-cron.ts skips
      # Sentry.init() and board failures never reach Sentry. Plaintext
      # value lives in /tmp/full-spec.yaml at deploy time (per the same
      # pattern as DATABASE_URL above).
      - key: SENTRY_DSN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      # HEALTHCHECKS_URL: Healthchecks.io ping URL for the 6h sync cadence
      # cron. Track C.3. Without this, sync-cron.ts skips heartbeat pings.
      # Not a SECRET — Healthchecks URLs are write-only tokens. Plaintext
      # filled in at deploy time via /tmp/full-spec.yaml.
      - key: HEALTHCHECKS_URL
        scope: RUN_AND_BUILD_TIME

  # sync-digest — Track C.4. Daily admin digest of yesterday's syncs.
  # Queries SyncLog for the last 24h, aggregates totals + failures, emails
  # all users WHERE role = 'ADMIN' via Resend. Plaintext SECRETs filled in
  # at deploy time via /tmp/full-spec.yaml (per the rule at top of file).
  - name: sync-digest
    github:
      repo: glennfiocca/launchpad-jobs
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    kind: SCHEDULED
    schedule:
      # 09:00 UTC daily. Hits inboxes around start-of-day for east-coast US
      # admins (04:00 EST / 05:00 EDT). DO cron is pure UTC — no DST shift.
      cron: "0 9 * * *"
    run_command: npx tsx scripts/sync-digest.ts
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    timeout_seconds: 300
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_TIME
        type: SECRET
      - key: RESEND_API_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: RESEND_FROM_EMAIL
        scope: RUN_AND_BUILD_TIME
        value: noreply@trypipeline.ai
      - key: NEXT_PUBLIC_APP_URL
        scope: RUN_AND_BUILD_TIME
        value: ${APP_URL}
      - key: SENTRY_DSN
        scope: RUN_AND_BUILD_TIME
        type: SECRET

  # prune-orphan-logos — Track C.1. Weekly purge of Spaces objects under
  # logos/ that no Company.logoUrl row references. Reads list of objects,
  # diffs against the DB, deletes orphans in 1k-key batches. Idempotent.
  - name: prune-orphan-logos
    github:
      repo: glennfiocca/launchpad-jobs
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    kind: SCHEDULED
    schedule:
      # 04:00 UTC every Sunday. Off-peak window; ~30s typical runtime.
      cron: "0 4 * * 0"
    run_command: npx tsx scripts/prune-orphan-logos.ts --apply
    instance_count: 1
    instance_size_slug: apps-s-1vcpu-0.5gb
    timeout_seconds: 600
    envs:
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
      - key: DIRECT_URL
        scope: RUN_TIME
        type: SECRET
      - key: DO_SPACES_KEY
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_SPACES_SECRET
        scope: RUN_AND_BUILD_TIME
        type: SECRET
      - key: DO_SPACES_BUCKET
        scope: RUN_AND_BUILD_TIME
        value: pipeline-uploads
      - key: DO_SPACES_REGION
        scope: RUN_AND_BUILD_TIME
        value: nyc3
      - key: SENTRY_DSN
        scope: RUN_AND_BUILD_TIME
        type: SECRET
